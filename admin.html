<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Portal Prefeitura Vila Bela MT</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef2f7;color:#222}header{background:#0b7a53;color:#fff;padding:24px;text-align:center}.wrap{max-width:1000px;margin:auto;padding:16px}.card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin:14px 0}.item{border:1px solid #ddd;border-radius:10px;padding:12px;margin:8px 0}button,select,input{padding:10px;border-radius:8px;border:1px solid #ccc;margin:4px}.danger{background:#dc2626;color:#fff;border:0}button{background:#0b7a53;color:#fff;border:0}
</style></head><body>
<header><h1>Painel Administrativo</h1><p>Portal Prefeitura Vila Bela MT</p></header>
<div class='wrap'>
<div class='card'><input id='senha' type='password' placeholder='Senha administrativa'><button onclick='entrar()'>Entrar</button><div id='msg'></div></div>
<div class='card' id='painel' style='display:none'><h2>Contatos</h2><div id='lista'></div></div>
</div>
<script type='module'>
import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js';
import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js';
const firebaseConfig={apiKey:'AIzaSyBSXXHj9RVPUA73fBIyS91c-PXoRhnwZT0',authDomain:'portal-vilabela-mt-3e11e.firebaseapp.com',projectId:'portal-vilabela-mt-3e11e',storageBucket:'portal-vilabela-mt-3e11e.firebasestorage.app',messagingSenderId:'953992010471',appId:'1:953992010471:web:8a1980a0e7bd19b2092042'};
const app=initializeApp(firebaseConfig); const db=getFirestore(app);
window.entrar=()=>{if(senha.value==='1234'){painel.style.display='block';msg.innerText='Acesso liberado';carregar();}else msg.innerText='Senha incorreta';}
function carregar(){onSnapshot(collection(db,'contatos'),(snap)=>{let html='';snap.forEach((r)=>{const d=r.data();html+=`<div class='item'><b>${d.nome||''}</b><br>${d.email||''}<br>${d.mensagem||''}<br><select onchange="statusAlt('${r.id}',this.value)"><option ${d.status==='novo'?'selected':''}>novo</option><option ${d.status==='em análise'?'selected':''}>em análise</option><option ${d.status==='resolvido'?'selected':''}>resolvido</option></select><button class='danger' onclick="excluir('${r.id}')">Excluir</button></div>`});lista.innerHTML=html;});}
window.statusAlt=async(id,v)=>await updateDoc(doc(db,'contatos',id),{status:v});window.excluir=async(id)=>await deleteDoc(doc(db,'contatos',id));
</script></body></html>
