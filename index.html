<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Executivo - Vila Bela</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef2f7;color:#222}header{background:#0b7a53;color:#fff;padding:20px;text-align:center}.wrap{max-width:1200px;margin:auto;padding:16px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.08)}canvas{max-width:100%}
</style>
</head>
<body>
<header><h1>Dashboard Executivo</h1><p>Portal Prefeitura Vila Bela MT</p></header>
<div class='wrap'>
<div class='grid'>
<div class='card'><h3>Total de Contatos</h3><h1 id='total'>0</h1></div>
<div class='card'><h3>Novos</h3><h1 id='novos'>0</h1></div>
<div class='card'><h3>Em Análise</h3><h1 id='analise'>0</h1></div>
<div class='card'><h3>Resolvidos</h3><h1 id='resolvidos'>0</h1></div>
</div>
<div class='card'><h3>Status das Demandas</h3><canvas id='graficoStatus'></canvas></div>
<div class='card'><h3>Evolução de Registros</h3><canvas id='graficoTempo'></canvas></div>
</div>
<script type='module'>
import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js';
import { getFirestore, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js';
const firebaseConfig={apiKey:'AIzaSyA0gzcURBN0U4oTwQVOav1Mmq3U5KZY-cc',authDomain:'portal-vilabela-mt.firebaseapp.com',projectId:'portal-vilabela-mt',storageBucket:'portal-vilabela-mt.appspot.com',messagingSenderId:'560298903980',appId:'1:560298903980:web:9f8e4e6f7a6b5c4d3e2a1b'};
const app=initializeApp(firebaseConfig); const db=getFirestore(app);
let c1,c2;
onSnapshot(collection(db,'contatos'),(snap)=>{let total=snap.size,novos=0,analise=0,resolvidos=0;let porDia={};snap.forEach(doc=>{const d=doc.data();const st=d.status||'novo';if(st==='novo')novos++;else if(st==='em análise')analise++;else if(st==='resolvido')resolvidos++;const dia=(d.data&&d.data.seconds)?new Date(d.data.seconds*1000).toLocaleDateString('pt-BR'):'Sem data';porDia[dia]=(porDia[dia]||0)+1;});document.getElementById('total').innerText=total;document.getElementById('novos').innerText=novos;document.getElementById('analise').innerText=analise;document.getElementById('resolvidos').innerText=resolvidos;
if(c1)c1.destroy(); c1=new Chart(document.getElementById('graficoStatus'),{type:'doughnut',data:{labels:['Novos','Em análise','Resolvidos'],datasets:[{data:[novos,analise,resolvidos]}]}});
if(c2)c2.destroy(); c2=new Chart(document.getElementById('graficoTempo'),{type:'bar',data:{labels:Object.keys(porDia),datasets:[{label:'Registros',data:Object.values(porDia)}]}});
});
</script>
</body>
</html>
