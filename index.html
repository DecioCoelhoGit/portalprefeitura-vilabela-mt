<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Prefeitura Vila Bela</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f0f4f8;
}
header{
background:#0f766e;
color:white;
padding:40px;
text-align:center;
}
section{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}
.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<header>
<h1>Portal Prefeitura Vila Bela</h1>
<p>Serviços • Notícias • Transparência</p>
</header>

<section>
<div class="card">
<h2>Serviços</h2>
<p>IPTU, protocolos e atendimento.</p>
</div>

<div class="card">
<h2>Notícias</h2>
<p>Comunicados oficiais.</p>
</div>

<div class="card">
<h2>Transparência</h2>
<p>Relatórios públicos.</p>
</div>
</section>

</body>
</html>
