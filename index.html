<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Diagnóstico Firebase</title><style>body{font-family:Arial;padding:15px;background:#f4f6f8}input,textarea,button{width:100%;padding:10px;margin:6px 0}button{background:#0b7a53;color:#fff;border:0}#log{background:#fff;padding:10px;border-radius:8px;white-space:pre-line}</style></head><body><h2>Diagnóstico Portal Vila Bela</h2><input id='nome' placeholder='Nome'><input id='email' placeholder='E-mail'><textarea id='mensagem'></textarea><button id='btn'>Testar Envio</button><div id='log'>Iniciando...</div><script type='module'>const log=t=>document.getElementById('log').innerText+=`\n${t}`;try{log('Carregando SDK...');import('https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js').then(async appMod=>{const fs=await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');log('SDK OK');const cfg={apiKey:'AIzaSyBSXXHj9RVPUA73fBIyS91c-PXoRhnwZT0',authDomain:'portal-vilabela-mt-3e11e.firebaseapp.com',projectId:'portal-vilabela-mt-3e11e',storageBucket:'portal-vilabela-mt-3e11e.firebasestorage.app',messagingSenderId:'953992010471',appId:'1:953992010471:web:8a1980a0e7bd19b2092042'};const app=appMod.initializeApp(cfg);const db=fs.getFirestore(app);log('Firebase iniciado');document.getElementById('btn').onclick=async()=>{log('Tentando salvar...');try{await fs.addDoc(fs.collection(db,'contatos'),{nome:nome.value,email:email.value,mensagem:mensagem.value,data:fs.serverTimestamp()});log('SALVO COM SUCESSO');}catch(e){log('ERRO: '+e.message);}}}).catch(e=>log('Erro SDK: '+e.message));}catch(e){log('Erro geral: '+e.message);}</script></body></html>
