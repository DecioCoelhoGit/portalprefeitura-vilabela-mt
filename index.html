<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Prefeitura Vila Bela MT</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef2f7;color:#222}header{background:#0b7a53;color:#fff;padding:24px;text-align:center;position:sticky;top:0}nav a{color:#fff;margin:0 8px;text-decoration:none;font-weight:bold}.wrap{max-width:1000px;margin:auto;padding:16px}.card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin:14px 0}input,textarea{width:100%;padding:10px;margin:6px 0;border:1px solid #ccc;border-radius:8px}button{background:#0b7a53;color:#fff;border:0;padding:10px 14px;border-radius:8px;cursor:pointer}
</style></head><body>
<header><h1>Portal Prefeitura Vila Bela MT</h1><nav><a href='#serv'>Serviços</a><a href='#not'>Notícias</a><a href='#trans'>Transparência</a><a href='#cont'>Contato</a></nav></header>
<div class='wrap'>
<div class='card' id='serv'><h2>Serviços</h2><p>IPTU, protocolos, atendimento e solicitações digitais.</p></div>
<div class='card' id='not'><h2>Notícias</h2><p>Comunicados oficiais e ações municipais.</p></div>
<div class='card' id='trans'><h2>Transparência</h2><p>Relatórios públicos e prestação de contas.</p></div>
<div class='card' id='cont'><h2>Fale Conosco</h2><input id='nome' placeholder='Seu nome'><input id='email' placeholder='Seu e-mail'><textarea id='mensagem' placeholder='Digite sua mensagem'></textarea><button onclick='salvarContato()'>Enviar</button><div id='msg'></div></div>
</div>
<script type='module'>
import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js';
import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js';
const firebaseConfig={apiKey:'AIzaSyBSXXHj9RVPUA73fBIyS91c-PXoRhnwZT0',authDomain:'portal-vilabela-mt-3e11e.firebaseapp.com',projectId:'portal-vilabela-mt-3e11e',storageBucket:'portal-vilabela-mt-3e11e.firebasestorage.app',messagingSenderId:'953992010471',appId:'1:953992010471:web:8a1980a0e7bd19b2092042'};
const app=initializeApp(firebaseConfig); const db=getFirestore(app);
window.salvarContato=async()=>{try{await addDoc(collection(db,'contatos'),{nome:nome.value,email:email.value,mensagem:mensagem.value,status:'novo',data:serverTimestamp()});msg.innerText='Mensagem enviada com sucesso!';nome.value='';email.value='';mensagem.value='';}catch(e){msg.innerText='Erro: '+e.message;}}
</script></body></html>
